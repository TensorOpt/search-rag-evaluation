# Explicit experiment config (docs/architecture.md §10).
# FULLY EXPLICIT: named services + named pipelines. There is NO matrix expansion and NO sweep — you
# write each pipeline you want to run by hand, so the config is readable at a glance. config.py
# (benchmark/config.py) parses + validates this into a ResolvedConfig; the runner iterates the
# baseline + explicit variant pipelines. Secrets are referenced via ${VAR} and resolved at load
# time — they never live in this file.
dataset:
  name: wands
  path: ./dataset/wands
services:                       # named, typed, reusable building blocks
  # Embedders/rerankers are PROVIDER CONNECTORS (benchmark/providers/inference.py): the harness calls Cohere /
  # Voyage / OpenAI directly — ES runs no inference (§1.1/§3.4). `provider` selects the connector;
  # `model_id`/`api_key`/`rate_limit`/`dims`(optional) live in `settings`. OpenAI has NO reranker.
  - embedder: { name: cohere, provider: cohere, settings: { api_key: "${COHERE_KEY}", model_id: embed-english-v3.0, rate_limit: { requests_per_minute: 90 } } }
  # `top_n` (reranker settings) is the PROVIDER cap: max candidates scored per request. It is DISTINCT
  # from a pipeline's `rerank_window_size` (how many candidates THAT pipeline sends). Invariant: per
  # pipeline W <= top_n (asserted at R0). Both are 100 here but mean different things (decision 8).
  - reranker: { name: co-rr,  provider: cohere, settings: { api_key: "${COHERE_KEY}", model_id: rerank-v3.5, top_n: 100, rate_limit: { requests_per_minute: 90 } } }
#  - embedder: { name: voyage, provider: voyage, settings: { api_key: "${VOYAGE_KEY}", model_id: voyage-3.5, rate_limit: { requests_per_minute: 300 } } }
#  - embedder: { name: openai, provider: openai, settings: { api_key: "${OPENAI_KEY}", model_id: text-embedding-3-small } }
#  - reranker: { name: vo-rr,  provider: voyage, settings: { api_key: "${VOYAGE_KEY}", model_id: rerank-2.5, top_n: 25, rate_limit: { requests_per_minute: 100 } } }
  - searcher: { name: bm25,        provider: elasticsearch, kind: lexical }
  - searcher: { name: semantic_co, provider: elasticsearch, kind: vector, embedder: cohere }
# ONE index (ES): a single `search_text` (BM25) `text` field plus one `dense_vector` field per
# embedder that a vector searcher references (§5.2). semantic_co is a FIELD in this one index, not a
# separate index. The indexer discovers which embedders to build vector fields for by scanning the
# vector searchers; the harness embeds each doc's search_text with the connector and stores the vector.
indexer:
  provider: elasticsearch
  index: wands_bench
  settings: { url: "${ES_URL}", bulk_chunk_size: 96, request_timeout: 30 }
pipelines:
  baseline_id: bm25             # baseline pipeline's artifact id (§9): result_bm25_*, comparison_bm25_*
  baseline:                     # the reference every variant is compared against
    retriever: bm25
  variants:                     # each is one explicit run; the map key is its id
#    semantic_e5:   { retriever: semantic_e5 }
    semantic_co:   { retriever: semantic_co }
    hybrid_co_k60:
      retrievers: [bm25, semantic_co]
      fuser: { type: rrf, rank_constant: 60, window: 100 }
    bm25_rerank:
      retriever: bm25
      reranker: co-rr
      rerank_window_size: 100
    semantic_co_rerank:         # 6th factorial cell: rerank isolated on dense-only retrieval
      retriever: semantic_co
      reranker: co-rr
      rerank_window_size: 100
    hybrid_co_rerank:
      retrievers: [bm25, semantic_co]
      fuser: { type: rrf, rank_constant: 60, window: 100 }
      reranker: co-rr
      rerank_window_size: 100
stats:
  test: permutation             # mean-δ sign-flip permutation (§8.2 default); wilcoxon selectable
  correction: bh                # Benjamini-Hochberg FDR (§8.3, default); by = Benjamini-Yekutieli
  alpha: 0.05                   # BOTH the raw per-test threshold AND the FDR target level q
  bootstrap_B: 10000            # CI resamples AND permutation count; p-resolution floor 1/(B+1) (§8.2)
  ci_level: 0.95                # UNADJUSTED per-comparison effect-size CI (§8.2); NOT a gate
  seed: 1234
  contrasts:                    # explicit system_a vs system_b pairs (§8.1); absent => every variant vs baseline
    - { a: semantic_co,        b: bm25,               family: true }   # headline: does dense beat lexical?
    - { a: hybrid_co_k60,      b: semantic_co,        family: true }   # does RRF-with-bm25 help or hurt dense?
    - { a: hybrid_co_rerank,   b: semantic_co,        family: true }   # is hybrid+rerank indistinguishable from dense?
    - { a: bm25_rerank,        b: bm25,               family: true }   # rerank isolation on lexical
    - { a: semantic_co_rerank, b: semantic_co,        family: true }   # rerank isolation on dense
    - { a: hybrid_co_rerank,   b: hybrid_co_k60,      family: true }   # rerank isolation on hybrid
    - { a: semantic_co_rerank, b: bm25_rerank,        family: true }   # do embeddings add anything once reranking is present?
    - { a: hybrid_co_rerank,   b: semantic_co_rerank, family: true }   # does fusion add anything once reranking is present?
  fdr_metrics: [ndcg@10]        # the ONLY metric in the BH family (§8.3, P1-1): 8 contrasts × 1 = 8 tests
metrics:                        # ONE relevance policy over ALL SIX metrics (§7, P0-2)
  unjudged: condensed           # condensed (Sakai deletion; recall reverts to condensed) | irrelevant (trec_eval)
  relevance_threshold: 0.5      # binary-relevance cut for precision/recall + R + qrels digest (N-3)
cutoff: 10                      # point/quality metrics @10 (avg_relevance, ndcg@10, precision@10)
top_k: 100                      # uniform retrieval depth: fuser.window == rerank_window_size == top_k (§5.3)
cache:                          # persistent inference/result cache (docs/architecture.md §5.5)
  enabled: true                 # block ABSENT -> disabled; embeddings/rerank/searcher lists memoized
  dir: .cache                   # single sqlite file (.cache/inference.sqlite), gitignored; `rm -rf .cache` to clear
